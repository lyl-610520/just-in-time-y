<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Just In Time">
  
  <title>Just In Time - 恰逢其时</title>
  
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="mask-icon" href="/masked-icon.svg" color="#000000">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #000;
    }
    
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    .loading-screen.fade-out {
      opacity: 0;
    }
    
    .loading-logo {
      font-size: 3rem;
      color: white;
      margin-bottom: 2rem;
      font-weight: 300;
      letter-spacing: 0.2em;
    }
    
    .loading-text {
      color: white;
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 1rem;
    }
    
    .loading-debug {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      text-align: center;
      max-width: 300px;
    }
    
    .skip-button {
      position: absolute;
      top: 2rem;
      right: 2rem;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }
    
    .skip-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }
    
    .skip-button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 加载动画 -->
    <div class="loading-screen" id="loadingScreen">
      <button class="skip-button" id="skipButton">跳过</button>
      <div class="loading-logo">Just In Time</div>
      <div class="loading-text">恰逢其时</div>
      <div class="loading-debug">
        正在加载应用...<br>
        3秒后自动启动，或点击右上角跳过按钮
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
